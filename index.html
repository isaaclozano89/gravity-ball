<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Ball</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #e5e8e8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            justify-content: center;
        }

        #game-container {
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        canvas {
            display: block;
            background-color: #f8fcfd;
            /* Grid paper effect */
            background-image: 
                linear-gradient(#d4e6ed 1px, transparent 1px),
                linear-gradient(90deg, #d4e6ed 1px, transparent 1px);
            background-size: 40px 40px;
            cursor: crosshair;
        }

        #ui {
            padding: 15px 25px;
            width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c3e50;
            color: #ecf0f1;
            box-sizing: border-box;
            border-bottom: 4px solid #1a252f;
        }

        .btn {
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }

        .btn:disabled { 
            background: #7f8c8d; 
            color: #bdc3c7;
            cursor: not-allowed; 
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0,0,0,0.2);
        }
        
        #btn-drop { background: #3498db; color: white; }
        #btn-drop:hover:not(:disabled) { background: #2980b9; }
        
        #btn-restart { background: #e74c3c; color: white; margin-right: 10px; }
        #btn-restart:hover { background: #c0392b; }
        
        #btn-next { background: #f1c40f; color: #2c3e50; display: none; }
        #btn-next:hover { background: #f39c12; }

        .stats {
            display: flex;
            gap: 25px;
            font-size: 20px;
            font-weight: bold;
        }
        
        .controls {
            display: flex;
            align-items: center;
        }
        
        .instructions {
            position: absolute;
            top: 90px;
            left: 20px;
            color: #7f8c8d;
            font-style: italic;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="stats">
            <span id="level-display">Nivel: 1</span>
            <span id="attempts-display">Intentos: 0</span>
        </div>
        <div class="controls">
            <button id="btn-restart" class="btn">Reiniciar</button>
            <button id="btn-drop" class="btn">Soltar Bola</button>
            <button id="btn-next" class="btn">Siguiente Nivel</button>
        </div>
    </div>
    <div id="instructions" class="instructions">Usa el mouse para dibujar puentes y rampas.</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const levelDisplay = document.getElementById('level-display');
    const attemptsDisplay = document.getElementById('attempts-display');
    const btnDrop = document.getElementById('btn-drop');
    const btnRestart = document.getElementById('btn-restart');
    const btnNext = document.getElementById('btn-next');
    const instructions = document.getElementById('instructions');

    // Game Variables
    let currentLevel = 0;
    let attempts = 0;
    let gameState = 'DRAWING'; // DRAWING, PLAYING, WON, LOST
    let animationId;
    
    // Physics Constants
    const GRAVITY = 0.6;
    const FRICTION = 0.99;
    const BOUNCE = 0.45;
    
    // Entities
    let ball = { x: 0, y: 0, vx: 0, vy: 0, radius: 14 };
    let portal = { x: 0, y: 0, radius: 24 };
    let staticLines = []; 
    let drawnLines = [];
    let currentLine = null;
    let isDrawing = false;

    // Levels Array
    const levels = [
        { // Level 1: Simple ramp 
            start: {x: 100, y: 120},
            portal: {x: 700, y: 480},
            lines: []
        },
        { // Level 2: The Gap
            start: {x: 100, y: 200},
            portal: {x: 700, y: 200},
            lines: [
                {x1: 40, y1: 280, x2: 250, y2: 280, type: 'normal'},
                {x1: 550, y1: 280, x2: 760, y2: 280, type: 'normal'},
                {x1: 0, y1: 580, x2: 800, y2: 580, type: 'danger'} // Fire floor
            ]
        },
        { // Level 3: Over the wall
            start: {x: 100, y: 150},
            portal: {x: 650, y: 500},
            lines: [
                {x1: 400, y1: 200, x2: 400, y2: 600, type: 'danger'},
                {x1: 40, y1: 250, x2: 200, y2: 250, type: 'normal'}
            ]
        },
        { // Level 4: Cave Drop
            start: {x: 100, y: 100},
            portal: {x: 700, y: 150},
            lines: [
                {x1: 0, y1: 200, x2: 250, y2: 400, type: 'normal'},
                {x1: 300, y1: 550, x2: 500, y2: 550, type: 'danger'},
                {x1: 550, y1: 400, x2: 800, y2: 250, type: 'normal'}
            ]
        },
        { // Level 5: Zip-Zag Mayhem
            start: {x: 50, y: 80},
            portal: {x: 400, y: 520},
            lines: [
                {x1: 0, y1: 180, x2: 550, y2: 180, type: 'normal'},
                {x1: 800, y1: 350, x2: 250, y2: 350, type: 'normal'},
                {x1: 650, y1: 180, x2: 800, y2: 180, type: 'danger'},
                {x1: 0, y1: 350, x2: 150, y2: 350, type: 'danger'},
                {x1: 0, y1: 580, x2: 800, y2: 580, type: 'danger'}
            ]
        }
    ];

    function loadLevel(index) {
        if(index >= levels.length) {
            alert("¡Felicidades! Has completado todos los niveles de Gravity Ball.");
            currentLevel = 0;
            index = 0;
            attempts = 0;
        }
        
        const lvl = levels[index];
        ball = { x: lvl.start.x, y: lvl.start.y, vx: 0, vy: 0, radius: 14 };
        portal = { x: lvl.portal.x, y: lvl.portal.y, radius: 24 };
        staticLines = [...lvl.lines.map(l => ({...l}))];
        drawnLines = [];
        gameState = 'DRAWING';
        
        btnDrop.disabled = false;
        btnDrop.style.display = 'inline-block';
        btnNext.style.display = 'none';
        instructions.style.display = index === 0 ? 'block' : 'none';
        
        updateUI();
        draw();
    }

    function updateUI() {
        levelDisplay.innerText = `Nivel: ${currentLevel + 1}`;
        attemptsDisplay.innerText = `Intentos: ${attempts}`;
    }

    // Input Handling for Drawing
    function getMousePos(evt) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: evt.clientX - rect.left,
            y: evt.clientY - rect.top
        };
    }

    canvas.addEventListener('mousedown', (e) => {
        if(gameState !== 'DRAWING') return;
        isDrawing = true;
        const pos = getMousePos(e);
        currentLine = { x1: pos.x, y1: pos.y, x2: pos.x, y2: pos.y };
    });

    canvas.addEventListener('mousemove', (e) => {
        if(!isDrawing || gameState !== 'DRAWING') return;
        const pos = getMousePos(e);
        currentLine.x2 = pos.x;
        currentLine.y2 = pos.y;
        draw();
    });

    canvas.addEventListener('mouseup', () => {
        if(!isDrawing || gameState !== 'DRAWING') return;
        isDrawing = false;
        // Only add line if it has some length
        const dx = currentLine.x2 - currentLine.x1;
        const dy = currentLine.y2 - currentLine.y1;
        if(Math.sqrt(dx*dx + dy*dy) > 10) {
            drawnLines.push({...currentLine});
        }
        currentLine = null;
        draw();
    });

    // Touch support basic
    canvas.addEventListener('touchstart', (e) => {
        if(e.target === canvas) e.preventDefault();
        if(gameState !== 'DRAWING') return;
        isDrawing = true;
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        currentLine = { x1: x, y1: y, x2: x, y2: y };
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        if(e.target === canvas) e.preventDefault();
        if(!isDrawing || gameState !== 'DRAWING') return;
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        currentLine.x2 = touch.clientX - rect.left;
        currentLine.y2 = touch.clientY - rect.top;
        draw();
    }, {passive: false});

    canvas.addEventListener('touchend', (e) => {
        if(e.target === canvas) e.preventDefault();
        if(!isDrawing || gameState !== 'DRAWING') return;
        isDrawing = false;
        const dx = currentLine.x2 - currentLine.x1;
        const dy = currentLine.y2 - currentLine.y1;
        if(Math.sqrt(dx*dx + dy*dy) > 10) {
            drawnLines.push({...currentLine});
        }
        currentLine = null;
        draw();
    });

    // Buttons
    btnDrop.addEventListener('click', () => {
        if(gameState === 'DRAWING') {
            gameState = 'PLAYING';
            attempts++;
            updateUI();
            btnDrop.disabled = true;
            instructions.style.display = 'none';
            requestAnimationFrame(gameLoop);
        }
    });

    btnRestart.addEventListener('click', () => {
        cancelAnimationFrame(animationId);
        loadLevel(currentLevel);
    });

    btnNext.addEventListener('click', () => {
        currentLevel++;
        loadLevel(currentLevel);
    });

    function gameLoop() {
        if(gameState !== 'PLAYING') return;
        
        updatePhysics();
        draw();
        
        if (gameState === 'PLAYING') {
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    // Math Utils
    function dist(x1, y1, x2, y2) {
        return Math.sqrt((x2-x1)**2 + (y2-y1)**2);
    }

    function closestPointOnLineSegment(p, a, b) {
        let ab = { x: b.x - a.x, y: b.y - a.y };
        let t = ((p.x - a.x) * ab.x + (p.y - a.y) * ab.y) / (ab.x * ab.x + ab.y * ab.y);
        
        if(isNaN(t)) return {x: a.x, y: a.y};
        
        t = Math.max(0, Math.min(1, t));
        return { x: a.x + t * ab.x, y: a.y + t * ab.y };
    }

    function updatePhysics() {
        const SUBSTEPS = 3;
        const dtGravity = GRAVITY / SUBSTEPS;

        for (let sub = 0; sub < SUBSTEPS; sub++) {
            // Apply gravity and velocity
            ball.vy += dtGravity;
            ball.x += ball.vx / SUBSTEPS;
            ball.y += ball.vy / SUBSTEPS;

            let checkRadius = ball.radius + 3; 
            let collisionHappened = false;

            // Check Collisions with lines
            let allLines = [...staticLines, ...drawnLines.map(l => ({...l, type: 'drawn'}))];

            for (let line of allLines) {
                let p = {x: ball.x, y: ball.y};
                let a = {x: line.x1, y: line.y1};
                let b = {x: line.x2, y: line.y2};
                
                let closest = closestPointOnLineSegment(p, a, b);
                let d = dist(p.x, p.y, closest.x, closest.y);

                if(d < checkRadius) {
                    if(line.type === 'danger') {
                        lose();
                        return;
                    }

                    let overlap = checkRadius - d;
                    
                    let nx = p.x - closest.x;
                    let ny = p.y - closest.y;
                    let len = Math.sqrt(nx*nx + ny*ny);
                    
                    if (len === 0) {
                        let dx = b.x - a.x;
                        let dy = b.y - a.y;
                        nx = -dy;
                        ny = dx;
                        len = Math.sqrt(nx*nx + ny*ny);
                    }
                    
                    nx /= len;
                    ny /= len;

                    ball.x += nx * overlap;
                    ball.y += ny * overlap;

                    let dot = ball.vx * nx + ball.vy * ny;
                    
                    if(dot < 0) {
                        ball.vx -= (1 + BOUNCE) * dot * nx;
                        ball.vy -= (1 + BOUNCE) * dot * ny;
                        ball.vx *= FRICTION;
                        ball.vy *= FRICTION;
                    }
                }
            }
            
            if(gameState !== 'PLAYING') return;
        }
        
        ball.vx *= 0.999;
        ball.vy *= 0.999;

        // Win condition: Portal intersection
        if(dist(ball.x, ball.y, portal.x, portal.y) < ball.radius * 0.5 + portal.radius) {
            win();
            return;
        }

        // Lose condition: Fall off screen
        if(ball.y > canvas.height + 50 || ball.x < -100 || ball.x > canvas.width + 100) {
            lose();
            return;
        }
    }

    function generateGlow(ctx, x, y, radius, colorInner, colorOuter) {
        let gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
        gradient.addColorStop(0, colorInner);
        gradient.addColorStop(1, colorOuter);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
    }

    let pulseTime = 0;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Binder Holes (Aesthetic)
        ctx.fillStyle = '#e5e8e8';
        for(let i=0; i<8; i++) {
            ctx.beginPath();
            ctx.arc(20, i*75 + 35, 12, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#d0d4d4';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Draw Portal
        pulseTime += 0.08;
        let pRadius = portal.radius + Math.sin(pulseTime) * 4;
        generateGlow(ctx, portal.x, portal.y, pRadius * 1.8, 'rgba(255, 215, 0, 0.6)', 'rgba(255, 215, 0, 0)');
        
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(portal.x, portal.y, portal.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#f39c12';
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(portal.x, portal.y, portal.radius - 8, pulseTime, pulseTime + Math.PI);
        ctx.stroke();

        // Draw Static Lines (Platforms & Hazards)
        staticLines.forEach(line => {
            ctx.beginPath();
            ctx.moveTo(line.x1, line.y1);
            ctx.lineTo(line.x2, line.y2);
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            if(line.type === 'danger') {
                ctx.strokeStyle = '#e74c3c'; // Red obstacle
                ctx.stroke();
                ctx.strokeStyle = '#c0392b';
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]); // reset
            } else {
                ctx.strokeStyle = '#7f8c8d'; // Grey solid
                ctx.stroke();
            }
        });

        // Draw Player Lines
        ctx.strokeStyle = '#2c3e50'; // Dark Blue/Black
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        drawnLines.forEach(line => {
            ctx.beginPath();
            ctx.moveTo(line.x1, line.y1);
            ctx.lineTo(line.x2, line.y2);
            ctx.stroke();
        });

        if(currentLine) {
            ctx.beginPath();
            ctx.moveTo(currentLine.x1, currentLine.y1);
            ctx.lineTo(currentLine.x2, currentLine.y2);
            ctx.strokeStyle = 'rgba(44, 62, 80, 0.6)';
            ctx.stroke();
        }

        // Draw Ball
        ctx.fillStyle = '#3498db'; // Vibrant Blue
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#2980b9';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.beginPath();
        ctx.arc(ball.x - 4, ball.y - 4, ball.radius * 0.35, 0, Math.PI * 2);
        ctx.fill();

        if(gameState === 'DRAWING') {
            ctx.fillStyle = 'rgba(52, 152, 219, 0.2)';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius + 5, 0, Math.PI * 2);
            ctx.fill();
        }

        // State Overlays
        if (gameState === 'WON') {
            ctx.fillStyle = 'rgba(46, 204, 113, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#27ae60';
            ctx.font = 'bold 48px Segoe UI';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('¡NIVEL COMPLETADO!', canvas.width/2, canvas.height/2);
        } else if (gameState === 'LOST') {
            ctx.fillStyle = 'rgba(231, 76, 60, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#c0392b';
            ctx.font = 'bold 48px Segoe UI';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('¡HAS FALLADO!', canvas.width/2, canvas.height/2 - 20);
            ctx.font = '24px Segoe UI';
            ctx.fillStyle = '#7f8c8d';
            ctx.fillText('Haz clic en Reiniciar', canvas.width/2, canvas.height/2 + 30);
        }
    }

    function win() {
        gameState = 'WON';
        draw();
        btnDrop.style.display = 'none';
        btnNext.style.display = 'inline-block';
    }

    function lose() {
        gameState = 'LOST';
        draw();
    }

    // Init Level 1
    loadLevel(0);

</script>
</body>
</html>
